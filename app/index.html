<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>applite — describe it, verify it, run it</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --edge: #262b36; --ink: #e6e9ef;
    --dim: #8b93a7; --accent: #7aa2f7; --ok: #9ece6a; --err: #f7768e;
    --mono: ui-monospace, "Cascadia Code", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink); height: 100vh;
    display: flex; flex-direction: column;
    font: 15px/1.5 system-ui, "Segoe UI", sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    border-bottom: 1px solid var(--edge); background: var(--panel);
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header h1 span { color: var(--accent); }
  header .sub { color: var(--dim); font-size: 12.5px; }
  header .grow { flex: 1; }
  button.ui {
    background: #1f2430; color: var(--ink); border: 1px solid var(--edge);
    border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer;
  }
  button.ui:hover { border-color: var(--accent); }
  button.ui.primary { background: var(--accent); color: #0b0e14; border: none; font-weight: 600; }
  select.ui {
    background: #1f2430; color: var(--ink); border: 1px solid var(--edge);
    border-radius: 6px; padding: 6px 8px; font-size: 13px;
  }
  input.idea {
    flex: 1; min-width: 120px; max-width: 420px; background: #12151c;
    color: var(--ink); border: 1px solid var(--edge); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; outline: none;
  }
  input.idea:focus { border-color: var(--ok); }
  button.ui.gen { background: var(--ok); color: #0b0e14; border: none; font-weight: 600; }
  main { flex: 1; display: flex; min-height: 0; }
  #left { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--edge); min-width: 0; }
  #src {
    flex: 1; background: var(--bg); color: var(--ink); border: none; resize: none;
    padding: 14px 16px; font: 13.5px/1.55 var(--mono); outline: none; white-space: pre;
  }
  #diag {
    display: none; max-height: 38%; overflow: auto; margin: 0;
    border-top: 1px solid var(--edge); background: #14161c; color: var(--err);
    padding: 10px 16px; font: 12.5px/1.5 var(--mono); white-space: pre;
  }
  #right { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #stage { flex: 1; overflow: auto; padding: 26px; }
  #app { max-width: 460px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
  #status {
    padding: 6px 16px; border-top: 1px solid var(--edge); color: var(--dim);
    font-size: 12px; background: var(--panel);
  }
  #status b.ok { color: var(--ok); font-weight: 600; }
  #status b.bad { color: var(--err); font-weight: 600; }
  /* The rendered app's widgets */
  .w-label { min-height: 1.2em; }
  .w-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .w-col { display: flex; flex-direction: column; gap: 10px; }
  button.w-button {
    background: #22304a; color: var(--ink); border: 1px solid #33507e;
    border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer;
  }
  button.w-button:active { transform: translateY(1px); }
  input.w-input {
    background: #12151c; color: var(--ink); border: 1px solid var(--edge);
    border-radius: 8px; padding: 8px 12px; font-size: 14px; outline: none;
  }
  input.w-input:focus { border-color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1><span>applite</span> vibe shell</h1>
  <div class="sub">describe it → verify it → run it&nbsp;·&nbsp;every app provably halts</div>
  <input id="idea" class="idea" placeholder="an app that… (local model writes it)" title="Describe an app; the LOCAL fine-tune generates candidates and the verifier keeps the first that passes">
  <button id="gen" class="ui gen" title="Needs the local generator: python serve.py">generate</button>
  <div class="grow"></div>
  <select id="examples" class="ui" title="examples"></select>
  <button id="copy" class="ui" title="Copies the language card + your idea as a prompt for any LLM">copy prompt</button>
  <button id="run" class="ui primary" title="Ctrl+Enter">verify + run</button>
</header>
<main>
  <div id="left">
    <textarea id="src" spellcheck="false"></textarea>
    <pre id="diag"></pre>
  </div>
  <div id="right">
    <div id="stage"><div id="app"></div></div>
    <div id="status">loading wasm…</div>
  </div>
</main>
<script>
"use strict";
let wasm, mem;
const enc = new TextEncoder(), dec = new TextDecoder();

function writeStr(s) {
  const bytes = enc.encode(s);
  const ptr = wasm.alloc(bytes.length);
  new Uint8Array(mem.buffer, ptr, bytes.length).set(bytes);
  return [ptr, bytes.length];
}
function takeOut() {
  return dec.decode(new Uint8Array(mem.buffer, wasm.out_ptr(), wasm.out_len()));
}
function freeStr([ptr, len]) { wasm.dealloc(ptr, len); }

const $ = (id) => document.getElementById(id);
const statusLine = (html) => { $("status").innerHTML = html; };
const showDiag = (text) => { const d = $("diag"); d.textContent = text; d.style.display = "block"; };
const hideDiag = () => { $("diag").style.display = "none"; };

function render(tree) {
  const focus = document.activeElement?.dataset?.state;
  const caret = focus ? document.activeElement.selectionStart : 0;
  const app = $("app");
  app.replaceChildren(...tree.map(build));
  if (focus) {
    const again = app.querySelector(`input[data-state="${CSS.escape(focus)}"]`);
    if (again) { again.focus(); again.setSelectionRange(caret, caret); }
  }
}
function build(n) {
  if (n.t === "label") { const d = document.createElement("div"); d.className = "w-label"; d.textContent = n.text; return d; }
  if (n.t === "button") {
    const b = document.createElement("button"); b.className = "w-button"; b.textContent = n.text;
    b.onclick = () => { const code = wasm.click(n.id); code === 0 ? (hideDiag(), render(JSON.parse(takeOut()))) : showDiag(takeOut()); };
    return b;
  }
  if (n.t === "input") {
    const i = document.createElement("input"); i.className = "w-input"; i.value = n.value; i.dataset.state = n.state;
    i.oninput = () => {
      const s = writeStr(n.state), t = writeStr(i.value);
      const code = wasm.input(s[0], s[1], t[0], t[1]);
      freeStr(s); freeStr(t);
      code === 0 ? (hideDiag(), render(JSON.parse(takeOut()))) : showDiag(takeOut());
    };
    return i;
  }
  const box = document.createElement("div");
  box.className = n.t === "row" ? "w-row" : "w-col";
  box.replaceChildren(...n.children.map(build));
  return box;
}

function run() {
  const s = writeStr($("src").value);
  const code = wasm.compile_src(s[0], s[1]);
  freeStr(s);
  if (code === 0) {
    hideDiag(); render(JSON.parse(takeOut()));
    statusLine('<b class="ok">verified</b> — this app halts on every event, faults roll back, memory is bounded');
  } else {
    showDiag(takeOut());
    statusLine('<b class="bad">rejected</b> — the verifier refused it (that is the point); fix and rerun');
  }
}

// The generate->verify->keep loop, in the page: the LOCAL fine-tune (see
// serve.py) samples candidates; THIS page's wasm verifier is the selector —
// the first candidate that compiles and checks becomes the live app.
async function generate() {
  const spec = $("idea").value.trim();
  if (!spec) { $("idea").focus(); return; }
  statusLine("generating locally…");
  let cands;
  try {
    const res = await fetch("http://localhost:8765/generate", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ spec, k: 4 }),
    });
    cands = (await res.json()).candidates;
  } catch {
    statusLine('<b class="bad">local generator offline</b> — start it with `python serve.py`, or use copy prompt with any LLM');
    return;
  }
  let firstDiag = null;
  for (let i = 0; i < cands.length; i++) {
    const s = writeStr(cands[i]);
    const code = wasm.compile_src(s[0], s[1]);
    freeStr(s);
    if (code === 0) {
      $("src").value = cands[i];
      hideDiag(); render(JSON.parse(takeOut()));
      statusLine(`<b class="ok">verified</b> — candidate ${i + 1} of ${cands.length} passed (${i} rejected); it halts on every event, faults roll back`);
      return;
    }
    if (firstDiag === null) firstDiag = takeOut();
  }
  $("src").value = cands[0] ?? "";
  showDiag(firstDiag ?? "no candidates");
  statusLine(`<b class="bad">all ${cands.length} candidates rejected</b> — the verifier refused every one; first rejection shown, edit and rerun`);
}

const EXAMPLES = {
  "counter": `state count = 0;

label "A counter, the hello world of apps";
row {
  button "-" { count = count - 1; }
  label count;
  button "+" { count = count + 1; }
  button "reset" { count = 0; }
}
if count >= 10 { label "double digits!"; }`,
  "greeter": `state name = "";

label "What's your name?";
input name;
if name != "" {
  label "Hello, " + name + "!";
} else {
  label "(type below)";
}`,
  "tip calculator": `state bill = 50;
state pct = 20;

label "Bill: $" + bill;
row {
  button "+10" { bill = bill + 10; }
  button "+1" { bill = bill + 1; }
  button "clear" { bill = 0; }
}
label "Tip percent: " + pct + "%";
row {
  button "15%" { pct = 15; }
  button "20%" { pct = 20; }
  button "25%" { pct = 25; }
}
label "Tip: $" + (bill * pct / 100);
label "Total: $" + (bill + bill * pct / 100);`,
  "traffic light": `state light = 0;

label "Traffic light";
if light == 0 { label "RED — stop"; }
else if light == 1 { label "GREEN — go"; }
else { label "YELLOW — hurry"; }
button "next" { light = light + 1; if light > 2 { light = 0; } }`,
};

async function boot() {
  const { instance } = await WebAssembly.instantiateStreaming(fetch("appshell.wasm"));
  wasm = instance.exports; mem = wasm.memory;
  const sel = $("examples");
  for (const name of Object.keys(EXAMPLES)) sel.add(new Option(name, name));
  sel.onchange = () => { $("src").value = EXAMPLES[sel.value]; run(); };
  $("run").onclick = run;
  $("gen").onclick = generate;
  $("idea").addEventListener("keydown", (e) => { if (e.key === "Enter") generate(); });
  $("copy").onclick = async () => {
    wasm.card();
    const idea = prompt("Describe the app you want:", "a counter with three buttons") ?? "";
    await navigator.clipboard.writeText(
      takeOut() + "\n\nWrite ONE applite program for this app: " + idea +
      "\nOutput ONLY the program, no prose, no code fences.");
    statusLine("prompt copied — paste it into any LLM, then paste its program back here and hit verify + run");
  };
  document.addEventListener("keydown", (e) => {
    if (e.ctrlKey && e.key === "Enter") { e.preventDefault(); run(); }
  });
  $("src").value = EXAMPLES["counter"];
  run();
}
boot().catch((e) => statusLine('<b class="bad">failed to load wasm</b> — build it first (see app/README.md): ' + e));
</script>
</body>
</html>
